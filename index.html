<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DCECE Mock Test - Practice Set (110 Qs)</title>

<style>
:root{
  --bg:#0f172a;
  --card:#1e293b;
  --text:#f8fafc;
  --border:#334155;
  --primary:#38bdf8;
  --green:#22c55e;
  --muted:#94a3b8;
  --danger:#ef4444;
  --yellow:#fbbf24;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:var(--bg);
  font-family:Arial,sans-serif;
  color:var(--text);
}

header{
  position:sticky;
  top:0;
  background:#111827;
  padding:15px 20px;
  border-bottom:1px solid var(--border);
  z-index:100;
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.header-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  width: 100%;
}

.header-top h1 {
  font-size: 20px;
  margin: 0;
  font-weight: bold;
}

.header-top h1 span {
  color: var(--yellow);
}

.showing-badge {
  background: var(--card);
  border: 1px solid var(--border);
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 14px;
  color: var(--muted);
}

.showing-badge span {
  color: white;
  font-weight: bold;
}

.header-bottom {
  display: flex;
  justify-content: space-between;
  align-items: center;
  width: 100%;
  flex-wrap: wrap;
  gap: 15px;
}

.filter-container {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  padding-bottom: 5px; 
  scrollbar-width: none; 
}

.filter-container::-webkit-scrollbar { 
  height: 0px; 
  display: none; 
}

.filter-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  padding: 8px 18px;
  border-radius: 20px;
  font-size: 14px;
  cursor: pointer;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: 0.2s;
  font-weight: 500;
}

.filter-btn:hover { 
  border-color: #64748b; 
  color: white; 
}

.filter-btn.active {
  background: var(--text);
  color: var(--bg);
  border-color: var(--text);
  font-weight: bold;
}

.timer-submit-group {
  display:flex; 
  align-items:center; 
  gap: 15px;
}

#timer {
  font-size: 18px;
  font-weight: bold;
  color: var(--danger);
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

#start-screen {
  background: var(--card);
  padding: 40px 20px;
  border-radius: 14px;
  border: 1px solid var(--border);
  text-align: center;
  max-width: 500px;
  margin: 100px auto;
}

#start-screen h2 {
  margin-bottom: 20px;
  color: var(--primary);
}

#studentNameInput {
  width: 100%;
  padding: 12px;
  margin-bottom: 20px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--bg);
  color: white;
  font-size: 16px;
}

.q-card{
  background:var(--card);
  padding:20px;
  border-radius:14px;
  border:1px solid var(--border);
}

.q-header-info {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
}

.q-number{
  font-size:14px;
  color:var(--muted);
  font-weight: bold;
}

.q-subject {
  font-size:12px;
  background: var(--border);
  padding: 3px 8px;
  border-radius: 4px;
  color: var(--primary);
}

.q-text{
  font-size:20px;
  margin-bottom:20px;
  line-height:1.5;
}

.options{
  display:grid;
  gap:12px;
}

.option{
  padding:14px;
  border:1px solid var(--border);
  border-radius:10px;
  cursor:pointer;
  transition:0.2s;
  background:#0f172a;
  line-height: 1.4;
}

.option:hover{
  border-color:var(--primary);
}

.option.selected{
  background:var(--primary);
  color:black;
  font-weight:bold;
}

.nav-buttons{
  display:flex;
  justify-content:space-between;
  margin-top:25px;
  gap:10px;
}

button{
  padding:12px 20px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-size:16px;
  font-weight:bold;
}

.prev-btn{
  background:#475569;
  color:white;
  flex: 1;
}
.prev-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.skip-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  flex: 1;
}
.skip-btn:hover {
  background: var(--border);
  color: white;
}

.next-btn{
  background:var(--primary);
  color:black;
  flex: 2;
}
.next-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.submit-btn{
  background:var(--green);
  color:white;
}

.palette-container {
  background: var(--card);
  padding: 15px;
  border-radius: 14px;
  border: 1px solid var(--border);
  margin-top: 20px;
}

.palette-title {
  font-size: 16px;
  margin-bottom: 15px;
  color: var(--text);
  text-align: center;
}

.palette{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(40px,1fr));
  gap:8px;
  max-height: 250px;
  overflow-y: auto;
  padding-right: 5px;
}

.palette::-webkit-scrollbar { width: 6px; }
.palette::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.p-btn{
  height:40px;
  padding: 0;
  border:none;
  border-radius:8px;
  background:#0f172a;
  border: 1px solid var(--border);
  color:white;
  cursor:pointer;
  font-size: 14px;
}

.p-btn.answered{
  background:var(--green);
  border-color: var(--green);
  color: black;
}
.p-btn.active-q {
  border: 2px solid var(--primary);
}

.result{
  margin-top:20px;
  padding:20px;
  background:#052e16;
  border: 1px solid var(--green);
  border-radius:10px;
  display:none;
  text-align: center;
}
.result h2 { color: var(--green); margin-bottom: 15px; }
.result p { margin-bottom: 8px; font-size: 18px; }

.review-container { margin-top: 30px; text-align: left; max-width: 900px; margin-left: auto; margin-right: auto; padding: 0 10px; }
.review-q-card { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 10px; margin-bottom: 15px; }
.review-q-header { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px; font-weight: bold; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
.review-q-text { font-size: 16px; margin-bottom: 15px; line-height: 1.4; color: white; }
.review-options { display: grid; gap: 8px; }
.review-opt { padding: 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; background: #0f172a; color: var(--text); }
.review-opt.correct { background: var(--green); color: black; font-weight: bold; border-color: var(--green); }
.review-opt.wrong { background: var(--danger); color: white; font-weight: bold; border-color: var(--danger); }

#loading-overlay {
  display: none;
  position: fixed;
  top:0; left:0; width:100%; height:100%;
  background: rgba(0,0,0,0.85);
  z-index: 1000;
  color: white;
  text-align: center;
  padding-top: 200px;
  font-size: 24px;
}

@media(max-width:600px){
  .header-top { flex-direction: column; align-items: flex-start; gap: 10px; }
  .header-bottom { flex-direction: column; align-items: stretch; }
  .timer-submit-group { justify-content: space-between; }
  .q-text{ font-size:18px; }
  .nav-buttons { flex-wrap: wrap; }
  .nav-buttons button { padding: 10px; font-size: 14px; }
  .next-btn { flex-basis: 100%; }
}
</style>
</head>
<body>

<div id="start-screen">
  <h2>DCECE Mock Test - Practice Set</h2>
  <p style="margin-bottom: 20px; color: var(--muted); font-size: 14px;">Total Time: 1 Hour 30 Minutes<br>Total Questions: 110</p>
  <input type="text" id="studentNameInput" placeholder="Enter your Name or Roll No.">
  <button class="submit-btn" style="width: 100%; padding: 12px;" onclick="startTest()">Start Test</button>
</div>

<div id="main-test-area" style="display: none;">
  <header>
    <div class="header-top">
      <h1>DCECE Bihar &mdash; <span>110 MCQ</span> Set</h1>
      <div class="showing-badge" id="showingBadge">Showing: <span>110</span> / 110</div>
    </div>
    
    <div class="header-bottom">
      <div class="filter-container" id="filter-container">
        <button class="filter-btn active" data-sub="All" onclick="filterSubject('All')">All Subjects</button>
        <button class="filter-btn" data-sub="Chemistry" onclick="filterSubject('Chemistry')">🧪 Chemistry</button>
        <button class="filter-btn" data-sub="Biology" onclick="filterSubject('Biology')">🌿 Biology</button>
        <button class="filter-btn" data-sub="Hindi" onclick="filterSubject('Hindi')">Ⓗ Hindi</button>
        <button class="filter-btn" data-sub="GK" onclick="filterSubject('GK')">🌍 GK</button>
        <button class="filter-btn" data-sub="Maths" onclick="filterSubject('Maths')">➗ Maths</button>
      </div>

      <div class="timer-submit-group">
        <div id="timer">01:30:00</div>
        <button class="submit-btn" style="padding: 8px 16px; font-size: 14px;" onclick="submitTest(false)">Submit Test</button>
      </div>
    </div>
  </header>

  <div class="container">
    <div class="q-card" id="quiz-area">
      <div class="q-header-info">
        <div class="q-number" id="qNo"></div>
        <div class="q-subject" id="qSub"></div>
      </div>
      
      <div class="q-text" id="question"></div>

      <div class="options" id="options"></div>

      <div class="nav-buttons">
        <button class="prev-btn" id="prevBtn" onclick="prevQuestion()">Previous</button>
        <button class="skip-btn" id="skipBtn" onclick="skipQuestion()">Skip</button>
        <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Save & Next</button>
      </div>
    </div>

    <div class="palette-container" id="palette-area">
      <div class="palette-title">Question Palette</div>
      <div class="palette" id="palette"></div>
    </div>
  </div>
</div>

<div class="result" id="result"></div>
<div id="review-area"></div>

<div id="loading-overlay">Submitting your test and sending email...<br><span style="font-size: 16px; color: var(--muted); margin-top: 10px; display: inline-block;">Please wait, do not close the window.</span></div>

let studentName = "";
let answers = {};
let filteredIndices = [];
let current = 0; 
let timerInterval;
let endTime;
const TEST_DURATION_MS = 90 * 60 * 1000; // 1 Hour 30 Minutes

window.onload = function() {
  studentName = localStorage.getItem("dcece_studentName");
  let savedEndTime = localStorage.getItem("dcece_endTime");
  
  if(studentName && savedEndTime && Date.now() < parseInt(savedEndTime)) {
    endTime = parseInt(savedEndTime);
    answers = JSON.parse(localStorage.getItem("dcece_day5_answers")) || {};
    document.getElementById("start-screen").style.display = "none";
    document.getElementById("main-test-area").style.display = "block";
    startTimer();
    filterSubject("All");
  } else {
    localStorage.removeItem("dcece_day5_answers");
    localStorage.removeItem("dcece_studentName");
    localStorage.removeItem("dcece_endTime");
  }
};

function startTest() {
  const nameInput = document.getElementById("studentNameInput").value.trim();
  if(!nameInput) {
    alert("Please enter your Name or Roll No. to start the test!");
    return;
  }
  
  studentName = nameInput;
  localStorage.setItem("dcece_studentName", studentName);
  
  endTime = Date.now() + TEST_DURATION_MS;
  localStorage.setItem("dcece_endTime", endTime.toString());
  
  document.getElementById("start-screen").style.display = "none";
  document.getElementById("main-test-area").style.display = "block";
  
  startTimer();
  filterSubject("All");
}

function startTimer() {
  updateTimerDisplay(); 
  timerInterval = setInterval(updateTimerDisplay, 1000);
}

function updateTimerDisplay() {
  let now = Date.now();
  let left = Math.max(0, endTime - now);
  
  let totalSeconds = Math.floor(left / 1000);
  let h = Math.floor(totalSeconds / 3600);
  let m = Math.floor((totalSeconds % 3600) / 60);
  let s = totalSeconds % 60;
  
  document.getElementById("timer").innerText = 
    `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;

  if (left <= 0) {
    clearInterval(timerInterval);
    submitTest(true); 
  }
}

function filterSubject(sub) {
  document.querySelectorAll('.filter-btn').forEach(btn => {
    if(btn.getAttribute('data-sub') === sub) btn.classList.add('active');
    else btn.classList.remove('active');
  });

  filteredIndices = [];
  questions.forEach((q, i) => {
    if (sub === "All" || q.sub === sub) filteredIndices.push(i);
  });
  
  current = 0;
  document.getElementById('showingBadge').innerHTML = `Showing: <span>${filteredIndices.length}</span> / ${questions.length}`;
  renderQuestion();
}

function renderQuestion() {
  if(filteredIndices.length === 0) return;
  
  const actualIndex = filteredIndices[current];
  const q = questions[actualIndex];
  
  document.getElementById("qNo").innerText = `Question ${actualIndex + 1} of ${questions.length}`;
  document.getElementById("qSub").innerText = `${q.sub}`;
  document.getElementById("question").innerText = q.q;
  
  let html = "";
  const letters = ['A','B','C','D'];
  q.opts.forEach((opt, index) => {
    const selected = answers[actualIndex] == index ? "selected" : "";
    html += `
      <div class="option ${selected}" onclick="selectOption(${actualIndex}, ${index})">
        <strong>${letters[index]}.</strong> ${opt}
      </div>
    `;
  });
  document.getElementById("options").innerHTML = html;
  
  document.getElementById("prevBtn").disabled = current === 0;
  
  const isLast = current === filteredIndices.length - 1;
  document.getElementById("skipBtn").disabled = isLast;
  document.getElementById("nextBtn").innerText = isLast ? "End of Subject" : "Save & Next";
  
  renderPalette();
}

function selectOption(actualIndex, index) {
  answers[actualIndex] = index;
  localStorage.setItem("dcece_day5_answers", JSON.stringify(answers));
  renderQuestion();
}

function nextQuestion() {
  if (current < filteredIndices.length - 1) {
    current++;
    renderQuestion();
  }
}

function skipQuestion() {
  const actualIndex = filteredIndices[current];
  delete answers[actualIndex];
  localStorage.setItem("dcece_day5_answers", JSON.stringify(answers));
  if (current < filteredIndices.length - 1) {
    current++;
    renderQuestion();
  }
}

function prevQuestion() {
  if (current > 0) {
    current--;
    renderQuestion();
  }
}

function jumpQuestion(actualIndex) {
  current = filteredIndices.indexOf(actualIndex);
  renderQuestion();
}

function renderPalette() {
  let html = "";
  filteredIndices.forEach((actualIndex) => {
    let classes = "p-btn";
    if (answers[actualIndex] !== undefined) classes += " answered";
    if (actualIndex === filteredIndices[current]) classes += " active-q";
    html += `<button class="${classes}" onclick="jumpQuestion(${actualIndex})">${actualIndex + 1}</button>`;
  });
  document.getElementById("palette").innerHTML = html;
}

function submitTest(isAuto = false) {
  if(!isAuto && !confirm("Are you sure you want to submit the final test? You cannot undo this.")) return;
  
  clearInterval(timerInterval);
  document.getElementById("loading-overlay").style.display = "block";
  
  let correct = 0;
  let incorrect = 0;
  let unattempted = 0;
  
  let detailedReport = `--- DETAILED QUESTION ANALYSIS ---\n\n`;

  questions.forEach((q, index) => {
    const correctAnsLetter = ansKey[q.n];
    const correctAnsIndex = letterToIndex[correctAnsLetter];
    const correctOptText = q.opts[correctAnsIndex];
    
    let userAnsLetter = "Not Attempted";
    let userOptText = "None";
    
    if (answers[index] !== undefined) {
      userAnsLetter = ['A','B','C','D'][answers[index]];
      userOptText = q.opts[answers[index]];
    }

    // Question Text Add Kiya
    detailedReport += `Q${q.n} (${q.sub}): ${q.q}\n`;

    if (userAnsLetter === "Not Attempted") {
      unattempted++;
      detailedReport += `Status: ⚠️ Unattempted\n`;
      detailedReport += `Correct Answer: ${correctAnsLetter}) ${correctOptText}\n\n`;
    } else if (userAnsLetter === correctAnsLetter) {
      correct++;
      detailedReport += `Status: ✅ Correct\n`;
      detailedReport += `Selected: ${userAnsLetter}) ${userOptText}\n\n`;
    } else {
      incorrect++;
      detailedReport += `Status: ❌ Incorrect\n`;
      detailedReport += `Selected: ${userAnsLetter}) ${userOptText}\n`;
      detailedReport += `Correct Answer: ${correctAnsLetter}) ${correctOptText}\n\n`;
    }
  });

  let attempted = correct + incorrect;

  let finalMessage = `Student Details:
Name / Roll No: ${studentName}

Test Result Summary:
Total Questions: ${questions.length}
Attempted: ${attempted}
Unattempted: ${unattempted}
Correct Answers: ${correct}
Wrong Answers: ${incorrect}

FINAL SCORE: ${correct} / ${questions.length}

${detailedReport}`;

  // === WEB3FORMS API CALL ===
  fetch('https://api.web3forms.com/submit', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Accept': 'application/json'
    },
    body: JSON.stringify({
      access_key: '9c7f3c85-004e-4888-b6ed-6ed6f4715db6', 
      subject: `DCECE Day 5 Result: ${studentName} scored ${correct}/${questions.length}`,
      message: finalMessage
    })
  })
  .then(async (response) => {
    let json = await response.json();
    if (response.status == 200) {
      console.log("Result sent successfully to email!");
    } else {
      console.log("Error sending email:", response);
    }
  })
  .catch(error => {
    console.log("Network Error:", error);
  })
  .finally(() => {
    document.getElementById("loading-overlay").style.display = "none";
    showResultUI(attempted, unattempted, correct, incorrect);
  });
}

function showResultUI(attempted, unattempted, correct, incorrect) {
  localStorage.removeItem("dcece_studentName");
  localStorage.removeItem("dcece_endTime");
  
  document.getElementById("main-test-area").style.display = "none";
  
  const result = document.getElementById("result");
  const reviewArea = document.getElementById("review-area");
  
  result.style.display = "block";
  document.body.appendChild(result); 
  document.body.appendChild(reviewArea); 
  
  result.innerHTML = `
    <h2>Test Submitted Successfully! ✅</h2>
    <p>Student: <strong>${studentName}</strong></p>
    <div style="text-align:left; max-width: 300px; margin: 20px auto; background: var(--card); padding: 15px; border-radius: 10px;">
      <p>Total Questions: <strong>${questions.length}</strong></p>
      <p>Attempted: <strong>${attempted}</strong></p>
      <p style="color:var(--muted)">Unattempted: <strong>${unattempted}</strong></p>
      <p style="color:var(--green)">Correct Answers: <strong>${correct}</strong></p>
      <p style="color:var(--danger)">Wrong Answers: <strong>${incorrect}</strong></p>
    </div>
    <h3 style="font-size: 24px; color: var(--primary);">Final Score: ${correct} / ${questions.length}</h3>
    <button class="submit-btn" style="width: auto; padding: 10px 20px; margin-top: 20px; margin-bottom: 30px;" onclick="location.reload(); localStorage.removeItem('dcece_day5_answers');">Retake Test</button>
  `;

  let reviewHTML = '<div class="review-container">';
  reviewHTML += '<h3 style="text-align:center; color:var(--primary); margin-bottom:30px; font-size:22px;">Detailed Answer Review</h3>';
  
  questions.forEach((q, index) => {
    const correctAnsLetter = ansKey[q.n];
    const correctAnsIndex = letterToIndex[correctAnsLetter];
    const userAnsIndex = answers[index];
    
    let statusText = '<span style="color:var(--yellow)">⚠️ Unattempted</span>';
    if(userAnsIndex !== undefined) {
      if(userAnsIndex === correctAnsIndex) {
        statusText = '<span style="color:var(--green)">✅ Correct</span>';
      } else {
        statusText = '<span style="color:var(--danger)">❌ Incorrect</span>';
      }
    }
    
    reviewHTML += `
      <div class="review-q-card">
        <div class="review-q-header">
          <span style="color:var(--muted)">Q${q.n}. (${q.sub})</span>
          ${statusText}
        </div>
        <div class="review-q-text">${q.q}</div>
        <div class="review-options">
    `;
    
    const letters = ['A','B','C','D'];
    q.opts.forEach((opt, optIdx) => {
      let optClass = "review-opt";
      if (optIdx === correctAnsIndex) {
        optClass += " correct";
      } else if (optIdx === userAnsIndex) {
        optClass += " wrong";
      }
      
      reviewHTML += `<div class="${optClass}"><strong>${letters[optIdx]}.</strong> ${opt}</div>`;
    });
    
    reviewHTML += `</div></div>`;
  });
  
  reviewHTML += '</div>';
  reviewArea.innerHTML = reviewHTML;
  
  localStorage.removeItem('dcece_day5_answers');
}
</script>
